<!DOCTYPE html>
<html>
<head>
    <title>Teste Direto de Vendas</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h1>Teste Direto de Vendas</h1>
    
    <div class="row">
        <div class="col-6">
            <h3>Busca de Produtos</h3>
            <input type="text" id="campoBusca" class="form-control" placeholder="Digite aqui...">
            <button onclick="testarBusca()" class="btn btn-primary mt-2">Buscar</button>
            <div id="resultadoBusca" class="mt-3"></div>
        </div>
        <div class="col-6">
            <h3>Log</h3>
            <div id="log" style="height: 400px; overflow-y: auto; background: #f8f9fa; padding: 10px; font-family: monospace;"></div>
        </div>
    </div>

    <script>
    function log(msg) {
        const now = new Date().toLocaleTimeString();
        $('#log').append(`[${now}] ${msg}<br>`);
        $('#log').scrollTop($('#log')[0].scrollHeight);
        console.log(msg);
    }

    function testarBusca() {
        const termo = $('#campoBusca').val().trim();
        log(`Iniciando busca por: "${termo}"`);
        
        if (!termo) {
            log('ERRO: Termo vazio');
            return;
        }
        
        fetch(`/api/produtos/buscar?q=${encodeURIComponent(termo)}`)
            .then(response => {
                log(`Response status: ${response.status}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                log(`Dados recebidos: ${data.length} produtos`);
                if (data.length > 0) {
                    $('#resultadoBusca').html(`
                        <div class="alert alert-success">
                            <strong>Encontrados ${data.length} produtos:</strong><br>
                            ${data.slice(0, 3).map(p => `• ID ${p.id}: ${p.nome} - R$ ${p.preco.toFixed(2)}`).join('<br>')}
                            ${data.length > 3 ? '<br>...' : ''}
                        </div>
                    `);
                    log('Produtos listados com sucesso');
                } else {
                    $('#resultadoBusca').html('<div class="alert alert-info">Nenhum produto encontrado</div>');
                    log('Nenhum produto encontrado');
                }
            })
            .catch(error => {
                log(`ERRO: ${error.message}`);
                $('#resultadoBusca').html(`<div class="alert alert-danger">Erro: ${error.message}</div>`);
            });
    }

    // Auto-teste na inicialização
    $(document).ready(function() {
        log('Página carregada');
        
        // Testar busca vazia
        log('Testando API com busca vazia...');
        fetch('/api/produtos/buscar?q=')
            .then(response => response.json())
            .then(data => {
                log(`Busca vazia OK: ${data.length} produtos retornados`);
            })
            .catch(error => {
                log(`ERRO na busca vazia: ${error.message}`);
            });
        
        // Focus no campo
        $('#campoBusca').focus();
        
        // Enter no campo
        $('#campoBusca').keypress(function(e) {
            if (e.which === 13) {
                testarBusca();
            }
        });
        
        log('Configuração concluída');
    });
    </script>
</body>
</html>
