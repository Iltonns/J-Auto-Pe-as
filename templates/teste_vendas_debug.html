<!DOCTYPE html>
<html>
<head>
    <title>Teste Debug Vendas</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Teste de Funcionalidades da Área de Vendas</h1>
    
    <h2>1. Teste de Busca de Produtos</h2>
    <input type="text" id="termo_busca" placeholder="Digite um termo para buscar">
    <button onclick="testarBusca()">Buscar Produtos</button>
    <div id="resultado_busca"></div>
    
    <h2>2. Teste de Produto Único</h2>
    <input type="text" id="termo_produto" placeholder="Digite ID, código ou nome">
    <button onclick="testarProdutoUnico()">Buscar Produto</button>
    <div id="resultado_produto"></div>
    
    <h2>3. Teste de Venda</h2>
    <input type="number" id="venda_id" placeholder="ID da venda">
    <button onclick="testarVenda()">Buscar Venda</button>
    <div id="resultado_venda"></div>
    
    <h2>4. Teste de Configurações</h2>
    <button onclick="testarConfiguracoes()">Buscar Configurações</button>
    <div id="resultado_config"></div>

    <script>
    function testarBusca() {
        const termo = $('#termo_busca').val();
        if (!termo) {
            alert('Digite um termo');
            return;
        }
        
        console.log('Testando busca para:', termo);
        
        fetch(`/api/produtos/buscar?q=${encodeURIComponent(termo)}`)
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Dados recebidos:', data);
                $('#resultado_busca').html(`
                    <p><strong>Resultados encontrados:</strong> ${data.length}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `);
            })
            .catch(error => {
                console.error('Erro:', error);
                $('#resultado_busca').html(`<p style="color: red;">Erro: ${error}</p>`);
            });
    }
    
    function testarProdutoUnico() {
        const termo = $('#termo_produto').val();
        if (!termo) {
            alert('Digite um termo');
            return;
        }
        
        console.log('Testando produto único para:', termo);
        
        fetch(`/api/produto/${encodeURIComponent(termo)}`)
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Dados recebidos:', data);
                $('#resultado_produto').html(`<pre>${JSON.stringify(data, null, 2)}</pre>`);
            })
            .catch(error => {
                console.error('Erro:', error);
                $('#resultado_produto').html(`<p style="color: red;">Erro: ${error}</p>`);
            });
    }
    
    function testarVenda() {
        const vendaId = $('#venda_id').val();
        if (!vendaId) {
            alert('Digite um ID de venda');
            return;
        }
        
        console.log('Testando venda para ID:', vendaId);
        
        fetch(`/api/venda/${vendaId}`)
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Dados recebidos:', data);
                $('#resultado_venda').html(`<pre>${JSON.stringify(data, null, 2)}</pre>`);
            })
            .catch(error => {
                console.error('Erro:', error);
                $('#resultado_venda').html(`<p style="color: red;">Erro: ${error}</p>`);
            });
    }
    
    function testarConfiguracoes() {
        console.log('Testando configurações da empresa');
        
        fetch('/api/configuracoes-empresa')
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Dados recebidos:', data);
                $('#resultado_config').html(`<pre>${JSON.stringify(data, null, 2)}</pre>`);
            })
            .catch(error => {
                console.error('Erro:', error);
                $('#resultado_config').html(`<p style="color: red;">Erro: ${error}</p>`);
            });
    }
    </script>
</body>
</html>
