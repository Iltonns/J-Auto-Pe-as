<!DOCTYPE html>
<html>
<head>
    <title>Teste de Desconto</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Teste do Sistema de Desconto</h2>
        
        <div class="row">
            <div class="col-6">
                <h4>Simulação de Venda</h4>
                <div class="mb-3">
                    <label>Subtotal da Venda:</label>
                    <input type="number" id="subtotal" class="form-control" value="100" step="0.01">
                </div>
                
                <div class="mb-3">
                    <label>Desconto (%):</label>
                    <input type="number" id="desconto_teste" class="form-control" value="10" min="0" max="100" step="0.01">
                </div>
                
                <button onclick="calcularTeste()" class="btn btn-primary">Calcular</button>
            </div>
            
            <div class="col-6">
                <h4>Resultado</h4>
                <div class="card">
                    <div class="card-body">
                        <p><strong>Subtotal:</strong> R$ <span id="result_subtotal">0,00</span></p>
                        <p><strong>Desconto (%):</strong> <span id="result_percentual">0</span>%</p>
                        <p><strong>Valor do Desconto:</strong> R$ <span id="result_desconto">0,00</span></p>
                        <p><strong>Total Final:</strong> R$ <span id="result_total">0,00</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function calcularTeste() {
            const subtotal = parseFloat($('#subtotal').val()) || 0;
            const descontoPercentual = parseFloat($('#desconto_teste').val()) || 0;
            const valorDesconto = (subtotal * descontoPercentual) / 100;
            const totalFinal = subtotal - valorDesconto;
            
            $('#result_subtotal').text(subtotal.toFixed(2).replace('.', ','));
            $('#result_percentual').text(descontoPercentual.toFixed(2));
            $('#result_desconto').text(valorDesconto.toFixed(2).replace('.', ','));
            $('#result_total').text(totalFinal.toFixed(2).replace('.', ','));
        }
        
        // Calcular automaticamente quando valores mudarem
        $('#subtotal, #desconto_teste').on('input', calcularTeste);
        
        // Calcular inicialmente
        calcularTeste();
    </script>
</body>
</html>
