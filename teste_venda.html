<!DOCTYPE html>
<html>
<head>
    <title>Teste de Venda</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h2>Teste de Venda</h2>
    <button onclick="testarVenda()">Testar Venda</button>
    <div id="resultado"></div>

    <script>
        function testarVenda() {
            // Dados de teste da venda
            const dadosVenda = {
                cliente_id: '',
                forma_pagamento: 'dinheiro',
                desconto: 0,
                observacoes: 'Venda de teste',
                valor_pago: 25.00,
                itens: JSON.stringify([{
                    id: 1,
                    nome: 'Óleo do Motor Mobil',
                    preco: 25.00,
                    quantidade: 1,
                    subtotal: 25.00
                }])
            };

            // Simular o envio da venda
            $.ajax({
                url: 'http://127.0.0.1:5000/vendas/registrar',
                type: 'POST',
                data: dadosVenda,
                success: function(response) {
                    $('#resultado').html('<p style="color: green;">Venda registrada com sucesso!</p>');
                    console.log('Sucesso:', response);
                },
                error: function(xhr, status, error) {
                    $('#resultado').html('<p style="color: red;">Erro: ' + error + '</p>');
                    console.log('Erro:', xhr.responseText);
                }
            });
        }
    </script>
</body>
</html>
