<!DOCTYPE html>
<html>
<head>
    <title>Teste Orçamento</title>
    <script>
        // Simular a função adicionarItem
        let itensOrcamento = [];
        let contadorItens = 0;

        function adicionarItem(produtoId, produtoNome, preco, estoque) {
            console.log('adicionarItem chamado:', {produtoId, produtoNome, preco, estoque});
            
            // Verificar se o item já existe
            const itemExistente = itensOrcamento.find(item => item.produto_id === produtoId);
            
            if (itemExistente) {
                if (itemExistente.quantidade < estoque) {
                    itemExistente.quantidade++;
                    console.log('Quantidade aumentada:', itemExistente);
                } else {
                    console.log('Estoque insuficiente!');
                }
            } else {
                const novoItem = {
                    id: ++contadorItens,
                    produto_id: produtoId,
                    nome: produtoNome,
                    quantidade: 1,
                    preco_unitario: preco,
                    estoque: estoque
                };
                
                itensOrcamento.push(novoItem);
                console.log('Item adicionado:', novoItem);
            }
            
            console.log('Itens no orçamento:', itensOrcamento);
        }

        function testarBusca() {
            const termo = document.getElementById('termoBusca').value;
            console.log('Testando busca para:', termo);
            
            // Simular busca local
            const produtosTeste = [
                {id: 1, nome: 'Filtro de Óleo', preco: 25.50, estoque: 10},
                {id: 2, nome: 'Pastilha de Freio', preco: 85.00, estoque: 5},
                {id: 3, nome: 'Vela de Ignição', preco: 15.75, estoque: 8}
            ];
            
            const resultados = produtosTeste.filter(p => 
                p.nome.toLowerCase().includes(termo.toLowerCase())
            );
            
            console.log('Resultados encontrados:', resultados);
            
            const lista = document.getElementById('resultados');
            lista.innerHTML = '';
            
            resultados.forEach(produto => {
                const li = document.createElement('li');
                li.innerHTML = `
                    ${produto.nome} - R$ ${produto.preco.toFixed(2)} 
                    <button onclick="adicionarItem(${produto.id}, '${produto.nome}', ${produto.preco}, ${produto.estoque})">
                        Adicionar
                    </button>
                `;
                lista.appendChild(li);
            });
        }
    </script>
</head>
<body>
    <h1>Teste do Sistema de Orçamento</h1>
    
    <div>
        <label>Buscar produto:</label>
        <input type="text" id="termoBusca" placeholder="Digite o nome do produto">
        <button onclick="testarBusca()">Buscar</button>
    </div>
    
    <h3>Resultados:</h3>
    <ul id="resultados"></ul>
    
    <h3>Debug:</h3>
    <p>Abra o console do navegador (F12) para ver os logs</p>
    
    <script>
        // Testar a função diretamente
        console.log('=== TESTE DIRETO ===');
        adicionarItem(1, 'Produto Teste', 50.00, 10);
        adicionarItem(1, 'Produto Teste', 50.00, 10); // Aumentar quantidade
    </script>
</body>
</html>
