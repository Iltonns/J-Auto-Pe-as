<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Exportar PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .btn {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border: none;
            background-color: #28a745;
            color: white;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #218838;
        }
        .content {
            border: 1px solid #ddd;
            padding: 20px;
            margin-top: 20px;
        }
        #status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teste de Exportação PDF</h1>
        
        <div>
            <button class="btn" onclick="testarBiblioteca()">1. Testar se biblioteca está carregada</button>
            <button class="btn" onclick="exportarPDFSimples()">2. Exportar PDF Simples</button>
            <button class="btn" onclick="exportarPDFCompleto()">3. Exportar PDF Completo</button>
        </div>
        
        <div id="status"></div>
        
        <div id="contentToPrint" class="content">
            <h2>Conteúdo de Teste</h2>
            <p>Este é um teste de exportação de PDF.</p>
            <table border="1" style="width:100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Vencimento</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Conta de Luz</td>
                        <td>R$ 150,00</td>
                        <td>15/11/2025</td>
                    </tr>
                    <tr>
                        <td>Conta de Água</td>
                        <td>R$ 80,00</td>
                        <td>20/11/2025</td>
                    </tr>
                    <tr>
                        <td>Internet</td>
                        <td>R$ 120,00</td>
                        <td>25/11/2025</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function mostrarStatus(mensagem, tipo) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = tipo;
            statusDiv.innerHTML = mensagem;
        }

        function testarBiblioteca() {
            if (typeof html2pdf !== 'undefined') {
                mostrarStatus('✓ Biblioteca html2pdf.js carregada com sucesso!', 'success');
                console.log('html2pdf disponível:', html2pdf);
            } else {
                mostrarStatus('✗ ERRO: Biblioteca html2pdf.js NÃO está carregada!', 'error');
                console.error('html2pdf não está definido');
            }
        }

        function exportarPDFSimples() {
            if (typeof html2pdf === 'undefined') {
                mostrarStatus('✗ ERRO: Biblioteca html2pdf.js não está carregada!', 'error');
                return;
            }

            try {
                mostrarStatus('⏳ Gerando PDF simples...', 'success');
                const element = document.getElementById('contentToPrint');
                
                html2pdf()
                    .from(element)
                    .save('teste_simples.pdf')
                    .then(() => {
                        mostrarStatus('✓ PDF simples gerado com sucesso!', 'success');
                    })
                    .catch(error => {
                        mostrarStatus('✗ ERRO ao gerar PDF: ' + error.message, 'error');
                        console.error('Erro:', error);
                    });
            } catch (error) {
                mostrarStatus('✗ ERRO ao gerar PDF: ' + error.message, 'error');
                console.error('Erro:', error);
            }
        }

        function exportarPDFCompleto() {
            if (typeof html2pdf === 'undefined') {
                mostrarStatus('✗ ERRO: Biblioteca html2pdf.js não está carregada!', 'error');
                return;
            }

            try {
                mostrarStatus('⏳ Gerando PDF completo...', 'success');
                const element = document.getElementById('contentToPrint');
                const clone = element.cloneNode(true);
                
                const opt = {
                    margin: [10, 10, 15, 10],
                    filename: 'teste_completo_' + new Date().toISOString().split('T')[0] + '.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2,
                        useCORS: true,
                        logging: true
                    },
                    jsPDF: { 
                        unit: 'mm', 
                        format: 'a4', 
                        orientation: 'portrait'
                    },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                };
                
                html2pdf()
                    .set(opt)
                    .from(clone)
                    .save()
                    .then(() => {
                        mostrarStatus('✓ PDF completo gerado com sucesso!', 'success');
                    })
                    .catch(error => {
                        mostrarStatus('✗ ERRO ao gerar PDF: ' + error.message, 'error');
                        console.error('Erro:', error);
                    });
            } catch (error) {
                mostrarStatus('✗ ERRO ao gerar PDF: ' + error.message, 'error');
                console.error('Erro:', error);
            }
        }

        // Testar automaticamente ao carregar
        window.addEventListener('load', function() {
            setTimeout(testarBiblioteca, 1000);
        });
    </script>
</body>
</html>
